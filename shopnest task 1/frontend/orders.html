<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopNest - My Orders</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Fixed Top Navbar -->
  <nav class="navbar" id="navbar"></nav>

  <main class="container">
    <h2 class="section-title">My Orders</h2>
    
    <div id="orders-container">
      <div style="text-align: center; padding: 80px 0; color: var(--gray);">
        Loading your orders...
      </div>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    async function loadOrders() {
      if (!state.token) {
        renderLoggedOutState();
        return;
      }

      try {
        const res = await fetch('/api/orders', {
          headers: { 'Authorization': `Bearer ${state.token}` }
        });

        if (res.ok) {
          const orders = await res.json();
          renderOrders(orders);
        } else {
          showToast('Failed to load orders');
        }
      } catch (err) {
        console.error(err);
      }
    }

    function renderLoggedOutState() {
      const container = document.getElementById('orders-container');
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🔐</div>
          <h2 class="empty-title">Login Required</h2>
          <p class="empty-subtext">Please log in to view your order history.</p>
          <button class="btn btn-primary" onclick="showAuthModal('login')">Log In</button>
        </div>
      `;
    }

    function renderOrders(orders) {
      const container = document.getElementById('orders-container');
      if (orders.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📦</div>
            <h2 class="empty-title">No orders found</h2>
            <p class="empty-subtext">You haven't placed any orders yet.</p>
            <a href="/" class="btn btn-primary">Start Shopping</a>
          </div>
        `;
        return;
      }

      // Sort newest first
      orders.sort((a, b) => new Date(b.date) - new Date(a.date));

      container.innerHTML = `
        <div class="orders-list">
          ${orders.map(order => {
            const formattedDate = new Date(order.date).toLocaleDateString('en-IN', {
              year: 'numeric', month: 'long', day: 'numeric',
              hour: '2-digit', minute: '2-digit'
            });
            return `
              <div class="order-card">
                <div class="order-header">
                  <div class="order-info-group">
                    <div class="order-info">
                      <span class="order-info-label">Order Placed</span>
                      <span class="order-info-val">${formattedDate}</span>
                    </div>
                    <div class="order-info">
                      <span class="order-info-label">Total Amount</span>
                      <span class="order-info-val" style="font-weight: 700; color: var(--primary);">₹${order.total_amount.toFixed(2)}</span>
                    </div>
                    <div class="order-info">
                      <span class="order-info-label">Order ID</span>
                      <span class="order-info-val">#SN-${order.id}</span>
                    </div>
                  </div>
                  <span class="order-status">${order.status}</span>
                </div>
                <div class="order-body">
                  ${order.items.map(item => `
                    <div class="order-item-row">
                      <img src="${item.image}" alt="${item.name}" class="order-item-img">
                      <div class="order-item-info">
                        <h4 class="order-item-name">${item.name}</h4>
                        <span class="order-item-meta">Category: ${item.category}</span>
                      </div>
                      <div style="text-align: right;">
                        <div style="font-weight: 600; font-size: 14px;">₹${(item.price * item.quantity).toFixed(2)}</div>
                        <div style="font-size: 12px; color: var(--gray); margin-top: 2px;">Qty: ${item.quantity} @ ₹${item.price}</div>
                      </div>
                    </div>
                  `).join('')}
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    window.onUserAuthenticated = () => {
      loadOrders();
    };

    window.addEventListener('load', loadOrders);
  </script>
</body>
</html>
