<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Vibe 🔥</title>
  <!-- Google Fonts Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="padding-top: 0; background-color: var(--light-gray);">

  <div class="auth-wrapper">
    <div class="card auth-card">
      <div class="auth-header">
        <h1 class="auth-title" style="cursor: pointer;" onclick="window.location.href='index.html'">Vibe 🔥</h1>
        <p style="color: var(--gray); font-size: 14px;">Welcome back to Vibe</p>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <div class="error-message" id="error-message"></div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; margin-top: 8px;">Login</button>
      </form>

      <div class="auth-footer">
        New to Vibe? <a href="register.html">Sign Up</a>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
