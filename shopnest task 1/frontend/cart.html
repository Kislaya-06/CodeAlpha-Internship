<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopNest - My Cart</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Fixed Top Navbar -->
  <nav class="navbar" id="navbar"></nav>

  <main class="container">
    <div id="cart-container">
      <!-- Dynamic Cart Content -->
      <div style="text-align: center; padding: 80px 0; color: var(--gray);">
        Loading cart items...
      </div>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    let cartItems = [];

    async function loadCart() {
      if (!state.token) {
        renderLoggedOutState();
        return;
      }

      try {
        const res = await fetch('/api/cart', {
          headers: { 'Authorization': `Bearer ${state.token}` }
        });

        if (res.ok) {
          cartItems = await res.json();
          renderCart();
        } else {
          showToast('Failed to load cart');
        }
      } catch (err) {
        console.error(err);
      }
    }

    function renderLoggedOutState() {
      const container = document.getElementById('cart-container');
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🔐</div>
          <h2 class="empty-title">Login Required</h2>
          <p class="empty-subtext">Please log in to view and manage your shopping cart.</p>
          <button class="btn btn-primary" onclick="showAuthModal('login')">Log In</button>
        </div>
      `;
    }

    function renderCart() {
      const container = document.getElementById('cart-container');
      if (cartItems.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🛒</div>
            <h2 class="empty-title">Your cart is empty</h2>
            <p class="empty-subtext">Looks like you haven't added anything to your cart yet.</p>
            <a href="/" class="btn btn-primary">Start Shopping</a>
          </div>
        `;
        return;
      }

      // Calculate totals
      const subtotal = cartItems.reduce((acc, item) => {
        const price = item.product ? item.product.price : 0;
        return acc + (price * item.quantity);
      }, 0);

      const shipping = subtotal >= 999 ? 0 : 99;
      const total = subtotal + shipping;

      container.innerHTML = `
        <div class="cart-layout">
          <!-- Left Column: Items -->
          <div class="cart-items-col">
            <h2 class="section-title">My Cart (${cartItems.length} items)</h2>
            ${cartItems.map(item => {
              const product = item.product;
              if (!product) return '';
              const itemTotal = (product.price * item.quantity).toFixed(2);
              return `
                <div class="cart-item-card">
                  <img src="${product.image}" alt="${product.name}" class="cart-item-img">
                  <div class="cart-item-details">
                    <h3 class="cart-item-title">${product.name}</h3>
                    <div><span class="category-badge">${product.category}</span></div>
                    <span class="cart-item-price">₹${product.price} each</span>
                  </div>
                  <div class="cart-item-right">
                    <div class="cart-qty-ctrl">
                      <button class="cart-qty-btn" onclick="updateCartQty(${product.id}, ${item.quantity - 1})">-</button>
                      <span class="cart-qty-val">${item.quantity}</span>
                      <button class="cart-qty-btn" onclick="updateCartQty(${product.id}, ${item.quantity + 1})">+</button>
                    </div>
                    <span class="cart-item-total">₹${itemTotal}</span>
                    <button class="btn-remove-item" onclick="removeCartItem(${product.id})">🗑️</button>
                  </div>
                </div>
              `;
            }).join('')}
          </div>

          <!-- Right Column: Summary -->
          <div class="summary-col">
            <div class="summary-card">
              <h3 class="summary-title">Order Summary</h3>
              <div class="summary-row">
                <span>Subtotal</span>
                <span>₹${subtotal.toFixed(2)}</span>
              </div>
              <div class="summary-row">
                <span>Shipping</span>
                <span>${shipping === 0 ? 'FREE' : `₹${shipping.toFixed(2)}`}</span>
              </div>
              ${shipping > 0 ? `<div style="font-size: 11px; color: var(--gray); text-align: right; margin-top: -10px; margin-bottom: 15px;">Add ₹${(999 - subtotal).toFixed(2)} more for FREE shipping</div>` : ''}
              <div class="summary-row total">
                <span>Total</span>
                <span>₹${total.toFixed(2)}</span>
              </div>
              <button class="btn-checkout" onclick="placeOrder()">Proceed to Checkout</button>
            </div>
          </div>
        </div>
      `;
    }

    async function updateCartQty(productId, newQty) {
      if (newQty <= 0) {
        removeCartItem(productId);
        return;
      }

      try {
        const res = await fetch('/api/cart', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${state.token}`
          },
          body: JSON.stringify({ product_id: productId, quantity: newQty - getQuantityInCart(productId) })
        });

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || 'Failed to update quantity');
        }

        await loadCart();
        await fetchCartCount();
      } catch (err) {
        showToast(err.message);
      }
    }

    function getQuantityInCart(productId) {
      const item = cartItems.find(i => i.product_id === productId);
      return item ? item.quantity : 0;
    }

    async function removeCartItem(productId) {
      try {
        const res = await fetch(`/api/cart/${productId}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${state.token}` }
        });

        if (res.ok) {
          showToast('Product removed from cart');
          await loadCart();
          await fetchCartCount();
        } else {
          showToast('Failed to remove item');
        }
      } catch (err) {
        console.error(err);
      }
    }

    async function placeOrder() {
      try {
        const res = await fetch('/api/orders', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${state.token}` }
        });

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || 'Checkout failed');
        }

        showToast('Order placed successfully! Thank you for shopping with us.');
        // Redirect to orders page
        setTimeout(() => {
          window.location.href = '/orders.html';
        }, 1500);

      } catch (err) {
        showToast(err.message);
      }
    }

    window.onUserAuthenticated = () => {
      loadCart();
    };

    window.addEventListener('load', loadCart);
  </script>
</body>
</html>
