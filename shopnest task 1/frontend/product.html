<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopNest - Product Details</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Fixed Top Navbar -->
  <nav class="navbar" id="navbar"></nav>

  <main class="container">
    <a href="/" class="back-link">← Back to Products</a>

    <div class="product-detail-layout" id="product-detail-content">
      <!-- Loading Skeleton or placeholder -->
      <div style="grid-column: 1/-1; text-align: center; padding: 100px 0; color: var(--gray);">
        Loading product details...
      </div>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    let currentProduct = null;
    let selectedQuantity = 1;

    async function loadProductDetails() {
      const params = new URLSearchParams(window.location.search);
      const productId = params.get('id');

      if (!productId) {
        window.location.href = '/';
        return;
      }

      try {
        const res = await fetch(`/api/products/${productId}`);
        if (!res.ok) {
          document.getElementById('product-detail-content').innerHTML = `
            <div style="grid-column: 1/-1; text-align: center; padding: 80px 0;">
              <h2 style="font-size: 24px; margin-bottom: 10px;">Product Not Found</h2>
              <p style="color: var(--gray); margin-bottom: 20px;">The product you are looking for does not exist or has been removed.</p>
              <a href="/" class="btn btn-primary" style="display: inline-block;">Go Home</a>
            </div>
          `;
          return;
        }

        currentProduct = await res.json();
        renderProductDetails();
      } catch (err) {
        console.error(err);
      }
    }

    function renderProductDetails() {
      const layout = document.getElementById('product-detail-content');
      if (!layout || !currentProduct) return;

      const isLowStock = currentProduct.stock < 5;
      const imageUrl = currentProduct.image;
      const cleanImageUrl = imageUrl.split('?')[0];

      layout.innerHTML = `
        <!-- Left Column - Images -->
        <div class="product-image-container">
          <img src="${imageUrl}" alt="${currentProduct.name}" id="main-product-image" class="main-image">
          <div class="thumbnail-row">
            <img src="${cleanImageUrl}?w=120&auto=format&fit=crop" alt="Thumbnail 1" class="thumbnail active" onclick="setMainImage('${cleanImageUrl}?w=120&auto=format&fit=crop', this)">
            <img src="${cleanImageUrl}?w=300&auto=format&fit=crop" alt="Thumbnail 2" class="thumbnail" onclick="setMainImage('${cleanImageUrl}?w=300&auto=format&fit=crop', this)">
            <img src="${cleanImageUrl}?w=600&auto=format&fit=crop" alt="Thumbnail 3" class="thumbnail" onclick="setMainImage('${cleanImageUrl}?w=600&auto=format&fit=crop', this)">
          </div>
        </div>

        <!-- Right Column - Info -->
        <div class="product-info-col">
          <span class="category-badge">${currentProduct.category}</span>
          <h1 class="product-title">${currentProduct.name}</h1>
          
          <div class="rating-row">
            <div class="stars">
              <span>★</span><span>★</span><span>★</span><span>★</span><span class="star-half">★</span>
            </div>
            <span class="rating-count">(128 reviews)</span>
          </div>

          <div class="divider"></div>

          <div class="price-row">
            <span class="detail-price">₹${currentProduct.price}</span>
            ${isLowStock ? `<span class="stock-badge">Only ${currentProduct.stock} left!</span>` : ''}
          </div>

          <p class="detail-desc">${currentProduct.description}</p>

          <div class="quantity-container">
            <span class="quantity-label">Quantity:</span>
            <div class="quantity-selector">
              <button class="qty-btn" onclick="updateQty(-1)">-</button>
              <div class="qty-val" id="qty-value">1</div>
              <button class="qty-btn" onclick="updateQty(1)">+</button>
            </div>
          </div>

          <button class="btn-buy-now" onclick="addToCart()">
            Add to Cart 🛒
          </button>

          <div class="trust-badges">
            <div class="trust-badge">
              <span class="trust-icon">🚚</span>
              <span>Free Delivery over ₹999</span>
            </div>
            <div class="trust-badge">
              <span class="trust-icon">🔄</span>
              <span>7-Day Easy Returns</span>
            </div>
            <div class="trust-badge">
              <span class="trust-icon">🔒</span>
              <span>Secure Payment</span>
            </div>
          </div>
        </div>
      `;
    }

    function setMainImage(url, thumbElement) {
      document.getElementById('main-product-image').src = url;
      const thumbs = document.querySelectorAll('.thumbnail');
      thumbs.forEach(t => t.classList.remove('active'));
      thumbElement.classList.add('active');
    }

    function updateQty(change) {
      if (!currentProduct) return;
      const newVal = selectedQuantity + change;
      if (newVal >= 1 && newVal <= currentProduct.stock) {
        selectedQuantity = newVal;
        document.getElementById('qty-value').innerText = selectedQuantity;
      } else if (newVal > currentProduct.stock) {
        showToast(`Cannot add more. Only ${currentProduct.stock} items in stock.`);
      }
    }

    async function addToCart() {
      if (!state.token) {
        showToast('Please login to buy items.');
        showAuthModal('login');
        return;
      }

      try {
        const res = await fetch('/api/cart', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${state.token}`
          },
          body: JSON.stringify({ product_id: currentProduct.id, quantity: selectedQuantity })
        });

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || 'Failed to add items to cart');
        }

        showToast(`${selectedQuantity} item(s) added to cart successfully!`);
        await fetchCartCount();
      } catch (err) {
        showToast(err.message);
      }
    }

    window.onUserAuthenticated = () => {
      loadProductDetails();
    };

    window.addEventListener('load', loadProductDetails);
  </script>
</body>
</html>
