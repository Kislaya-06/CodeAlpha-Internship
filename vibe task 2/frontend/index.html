<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe 🔥 | Share Your Vibes</title>
  <!-- Google Fonts Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="logo" onclick="window.location.href='index.html'">Vibe 🔥</div>
    <div class="search-container">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Search Vibe..." class="search-input" id="search-bar" onkeypress="handleSearch(event)">
    </div>
    <div class="nav-actions" id="nav-actions">
      <!-- Generated via JS -->
    </div>
  </nav>

  <!-- Main Grid Layout -->
  <div class="container">
    <div class="grid-3col">
      
      <!-- Left Sidebar -->
      <aside class="sidebar-left" id="sidebar-left-container">
        <!-- Rendered dynamically via JS -->
      </aside>

      <!-- Main Content Feed -->
      <main class="feed-main-col">
        <!-- Create Post Container -->
        <div id="create-post-container">
          <!-- Rendered dynamically if logged in -->
        </div>

        <!-- Posts Feed -->
        <div id="feed-container">
          <!-- Skeletons & Posts rendered dynamically -->
        </div>
      </main>

      <!-- Right Sidebar -->
      <aside class="sidebar-right">
        <div class="card">
          <h3 style="font-weight: 700; font-size: 16px;">People to Follow</h3>
          <div id="people-to-follow-list">
            <!-- Rendered dynamically -->
          </div>
        </div>
      </aside>

    </div>
  </div>

  <!-- Shared Post Detail Modal (Loaded as modal structure) -->
  <div class="modal" id="post-detail-modal">
    <!-- Rendered dynamically on click -->
  </div>

  <!-- Global scripts -->
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    function handleSearch(e) {
      if (e.key === 'Enter') {
        const query = e.target.value.trim().toLowerCase();
        if (!query) return;
        // Search matches usernames or posts
        showToast(`Searching for: ${query}`);
      }
    }
  </script>
</body>
</html>
